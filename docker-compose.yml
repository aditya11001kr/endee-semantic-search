version: "3.9"

services:

  # ── Endee Vector Database ──────────────────────────────────────────
  endee:
    image: endeeio/endee:latest   # official Docker image
    container_name: endee
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docmind-api
    ports:
      - "8000:8000"
    environment:
      - ENDEE_URL=http://endee:8080   # override default localhost URL
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (static file server) ────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: docmind-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  endee_data:
